<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carousel with Grid Extension</title>

    <!-- Include SplideJS CSS -->
    <link
      rel="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css"
    />

    <link rel="stylesheet" href="splide.min.css/splide.min.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <main>
      <section class="splide" aria-label="Basic Structure Example">
        <div class="splide__track">
          <ul class="splide__list">
            <li class="splide__slide">
              <img
                src="./images/Apple AirPods Pro (2nd Generation).png"
                alt="Product 1"
              />
            </li>
            <li class="splide__slide">
              <img src="./images/by your dreams.png" alt="Product 2" />
            </li>
            <li class="splide__slide">
              <img
                src="./images/Samsung galaxy bud pro2 (1).png"
                alt="Product 3"
              />
            </li>
            <li class="splide__slide">
              <img
                src="./images/Apple AirPods Pro (2nd Generation).png"
                alt="Product 1"
              />
            </li>
            <li class="splide__slide">
              <img
                src="./images/Apple AirPods Pro (2nd Generation).png"
                alt="Product 1"
              />
            </li>
            <li class="splide__slide">
              <img
                src="./images/Apple AirPods Pro (2nd Generation).png"
                alt="Product 1"
              />
            </li>
            <li class="splide__slide">
              <img
                src="./images/Apple AirPods Pro (2nd Generation).png"
                alt="Product 1"
              />
            </li>
          </ul>
        </div>
      </section>
    </main>

    <!-- Include SplideJS and the Grid extension -->
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide-extension-grid@0.4.1/dist/js/splide-extension-grid.min.js"></script>

    <script src="../script.js"></script>
  </body>
</html>
